<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Quiz Session</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f6f7fb;
            padding:40px;
            margin:0;
        }

        .quiz-container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        h1{
            margin-top:0;
        }

        .desc{
            color:#666;
            margin-bottom:25px;
        }

        .question{
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:18px;
            margin-bottom:18px;
            background:#fafafa;
        }

        textarea{
            width:100%;
            padding:12px;
            border-radius:8px;
            border:1px solid #d1d5db;
            resize:vertical;
        }

        button{
            padding:12px 22px;
            background:#7c3aed;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#6d28d9;
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1 id="quiz-title">Loading quiz...</h1>
    <div id="quiz-description" class="desc"></div>

    <div style="font-size: 20px; font-weight: bold;">
        Время: <span id="timer">--:--</span>
    </div>

    <div id="questions-container"></div>

    <button onclick="submitQuiz()">Submit Quiz</button>
</div>

<script src="/js/quiz-session.js"></script>
</body>
</html>
