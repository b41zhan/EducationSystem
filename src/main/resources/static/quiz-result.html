<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Quiz Result</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fb;
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .result-card{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            width:420px;
            text-align:center;
        }

        .score{
            font-size:42px;
            font-weight:bold;
            color:#4CAF50;
            margin:20px 0;
        }

        .info{
            margin:10px 0;
            color:#555;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            background:#7c3aed;
            color:white;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#6d28d9;
        }
    </style>
</head>
<body>
<div class="result-card">
    <h1>📊 Результат квиза</h1>

    <div class="score" id="score">Загрузка...</div>

    <div class="info">Статус: <span id="status">-</span></div>
    <div class="info">Начало: <span id="startTime">-</span></div>
    <div class="info">Окончание: <span id="endTime">-</span></div>

    <button onclick="goBack()">Назад к квизам</button>
</div>

<script src="/js/quiz-result.js"></script>
</body>
</html>
